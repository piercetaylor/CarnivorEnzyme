# Enzyme families and protein accessions for CarnivorEnzyme pipeline.
# Used by: fetch_sequences.py, retrieve.smk
#
# Accession format: NCBI protein accession (e.g. BAF98919.1) or UniProt ID (e.g. C0HLV2)
# All accessions verified against NCBI Protein database, April 2026.
#
# Annotation conventions:
#   # VERIFIED: accession confirmed in NCBI/UniProt with correct annotation
#   # GENOME:   derived from genome annotation (may be hypothetical protein)
#   # TODO:     accession not yet found; requires supplementary table from cited paper
#   # PARTIAL:  sequence is incomplete (<80% expected length); flag for length filter
#   # OUTGROUP: non-carnivorous outgroup sequence
#
# Length ranges (expected full-length for filtering):
#   GH19 chitinases:         250-350 aa (mature); flag <200 aa
#   Purple acid phosphatase: 420-680 aa; flag <350 aa (some are truncated isoforms)
#   RNase T2:                200-270 aa; flag <180 aa
#   Nepenthesins (A1B):      380-460 aa (preproenzyme); flag <300 aa
#   Neprosins (G3):          370-470 aa (zymogen); flag <300 aa

tier1:

  # ============================================================
  # 1. GH19 CHITINASES (Class IV acidic chitinases)
  # ============================================================
  # Convergent substitutions: Fukushima et al. 2017, Nature Ecol. Evol., Fig. 3a
  # CAZy family: GH19 (glycoside hydrolase family 19)
  # Expected size: ~270-340 aa mature form
  # Key literature:
  #   - Fukushima et al. 2017 — convergent substitutions identified
  #   - Yoneda et al. 2025, FEBS Open Bio — D. adelae chitinase structurally characterized
  #   - Yoneda et al. 2025: first carnivorous plant chitinase with experimental structure (PDB?)
  #   - Drosera binata DbChitI-3 chitinase: pH optimum 2.5, induced by prey (Planta 2025)
  #   - GH19 Engineering Database (PMC8547705) — comprehensive sequence/diversity resource
  #   - Rye (Secale cereale) chitinase PDB 4J0L (1.75 Å): primary GH19 fold reference
  #   - D. adelae chitinase PDB 9JTR (1.73 Å): FIRST carnivorous plant GH19 crystal structure
  #   - Nepenthes chitinase NkChit2b-1 (Springer 2025) — insect resistance

  chitinases_gh19:
    cazy: GH19
    merops: null
    convergent_source: "Fukushima et al. 2017 Fig. 3a"
    expected_length_aa: [250, 350]
    accessions:

      # --- Nepenthes (Caryophyllales, pitfall pitcher) ---
      Nepenthes_gracilis:
        - GMH02533.1    # GENOME: Nepgr_004372, GH19 domain, 281 aa (Saul 2023 genome)
        - GMH20431.1    # GENOME: Nepgr_022272, GH19, 279 aa
        - GMH20430.1    # GENOME: Nepgr_022271, GH19, 276 aa
        - GMH27899.1    # GENOME: Nepgr_029742, GH19, 277 aa

      Nepenthes_alata:
        - BAF98919.1    # VERIFIED: Class IV chitinase, 277 aa; Ohnuma et al. 2011, Glycobiology
        - BBC62322.1    # VERIFIED: Class IV chitinase, 276 aa

      # --- Cephalotus (Oxalidales, pitfall pitcher — independent origin) ---
      Cephalotus_follicularis:
        - GAV70878.1    # GENOME: Glyco_hydro_19 domain, 319 aa (Fukushima 2017 genome)
        - GAV79313.1    # GENOME: GH19/Chitin_bind_1, 266 aa
        - GAV84623.1    # GENOME: GH19/Chitin_bind_1, 456 aa — NOTE: may include extra domain

      # --- Drosera (Caryophyllales, sticky trap) ---
      Drosera_rotundifolia:
        - GAB2242148.1  # GENOME: Droror1_Dr00018923, GH19-like, 279 aa
        - GAB2242147.1  # GENOME: Droror1_Dr00018922, GH19-like, 275 aa

      Drosera_capensis:
        - BDB33378.1    # VERIFIED: Class I chitinase, 325 aa — NOTE: Class I not Class IV;
                        # include for alignment context but flag as class_i=true
                        # NOTE: No standalone accession for D. capensis class IV GH19 (DCAP_0533
                        # identifier exists only in the draft genome, not submitted to GenBank).
                        # Use AZZ09188.1 (class I, 314 aa) as proxy if class IV unavailable.

      Drosera_adelae:
        - BAW35424.1    # VERIFIED: Basic chitinase (GH19 class I), 321 aa; Yoneda et al. 2025,
                        # FEBS Open Bio 15:1930-1944. Crystal structure deposited as PDB 9JTR (1.73 Å)
                        # NOTE: This is GH19 class I (has full Chitin_bind_1 domain), not class IV.
                        # Flag as class_i=true; include in alignment for cross-class comparison.

      # --- Dionaea (Caryophyllales, snap trap) ---
      Dionaea_muscipula:
        - ALO61073.1    # VERIFIED: Chitinase B, 314 aa; Libantova et al. 2014
                        # NOTE: class annotation ambiguous; verify GH19 membership via CAZy BLAST
        - AHB62682.1    # VERIFIED: Putative VF Chitinase I, 314 aa

      # --- Outgroups (non-carnivorous plants with characterized GH19 chitinases) ---
      Arabidopsis_thaliana:
        - BAD44251.1    # OUTGROUP VERIFIED: Class IV chitinase (CHIV/AT3G54420), 273 aa
        - O24603.1      # OUTGROUP VERIFIED: Endochitinase CHI (AT2G43570), 277 aa

      Solanum_lycopersicum:
        - XP_004237833.1 # OUTGROUP VERIFIED: Endochitinase EP3, 276 aa (gene LOC101256086)
                        # GCF_036512215.1; domains: chitinase_GH19 (cd00325) confirmed
                        # Truncated N-terminal CBD is hallmark of class IV — correct outgroup class

      # --- Sarraceniaceae (Ericales — independent origin 5) ---
      Sarracenia_purpurea:
        - KAL6971754.1  # GENOME VERIFIED: Endochitinase ep3, 232 aa (Tarnita 2023, PRJNA1050616)
                        # Domain: chitinase_GH19 (cd00325, residues 33-232) confirmed GH19
                        # No Chitin_bind_1 domain present — consistent with class IV truncation
                        # NOTE: BAW35444.1 (if encountered) is GH18 class III — DO NOT use for GH19

      Sarracenia_alata:
        - TODO          # NOT FOUND: Entrez search returned no GH19 for this taxon.
                        # Tarnita 2023 genome (JAPEKV000000000) exists but proteins not in NCBI.

      Darlingtonia_californica:
        - TODO          # NOT FOUND: Entrez search returned no GH19. Genome JAUBWS000000000
                        # (cobra lily, pH~5 fluid) proteins not indexed in NCBI Protein.

      Heliamphora_ciliata:
        - TODO          # NOT FOUND: Entrez search returned no GH19. Genome JAUMHN000000000
                        # (least acidic Sarraceniaceae, pH 5.5) proteins not indexed in NCBI.

      # --- Lentibulariaceae (Lamiales — independent origin 6) ---
      Utricularia_gibba:
        - TODO          # CONFIRMED NOT IN NCBI/UNIPROT: Only plastid proteins indexed for U. gibba.
                        # Lan 2017 genome (GCA_002189035.1) gene models are in JGI/CoGe format (unitig IDs).
                        # Lan 2017 (PNAS) confirmed 5-copy GH19 class IV expansion in U. gibba.
                        # ACTION: Download Lan 2017 genome supplementary; run GH19 HMM scan;
                        # store as resources/accessions/u_gibba_gh19.fasta (manual step).

      Pinguicula_moranensis:
        - TODO          # NOT FOUND: Entrez search returned no GH19. Genome JAOWBN000000000
                        # proteins not indexed in NCBI Protein.

      # --- Byblidaceae (Lamiales — independent origin 7) ---
      Byblis_filifolia:
        - TODO          # No genome published as of April 2026. No characterized accessions
                        # found. Pavlovič 2025 confirmed digestive secretion but no sequence data.

      # NOTE: Aldrovanda vesiculosa GH19 — REMOVED (April 2026)
      # PRJNA918534 covers only plastid/mitochondrial genomes. No nuclear genome annotation
      # for Aldrovanda exists in any public database. Palfalvi 2020 nuclear genome (509 Mbp,
      # 25,123 genes) was NOT submitted to NCBI Protein. Confirmed absent after exhaustive search.

      # --- Additional Drosera ---
      Drosera_spatulata:
        - TODO          # NOT FOUND: Entrez search returned one hit not in size range.
                        # Genome JAOVYX000000000 proteins not individually indexed in NCBI.

      Drosera_binata:
        - QHN63861.1    # VERIFIED: Endochitinase class I (DbChitI-3), 321 aa; MN481117.1
                        # Libantova et al. 2019 submission; pH optimum 2.5 (Planta 2025, PMC11725546)
                        # GH19 confirmed (Glyco_hydro_19 + Chitin_bind_1 domains). Class I annotation.

      # --- Additional Nepenthes ---
      Nepenthes_mirabilis:
        - TODO          # PARTIAL_RESOLVE: Goh 2025 genome (PRJEB86749, ENA) not in NCBI Protein.
                        # S3 supplementary (doi:10.1371/journal.pone.0322885.s003) parsed April 2026.
                        # Gene identified: Nep_mir_jg4646.t1 (276 aa, PF00182 E=5.2e-43, GH19 confirmed).
                        # Also: Nep_mir_jg6978.t1 (360 aa, chitinase PANTHER); 15 PF00182 hits total.
                        # ACTION: Download ENA PRJEB86749 protein FASTA; extract Nep_mir_jg4646.t1
                        # and related; store as resources/accessions/n_mirabilis_gh19.fasta
                        # Then replace this TODO with a local: reference in fetch_sequences.py

      Secale_cereale:
        - Q9FRV0        # OUTGROUP VERIFIED: Rye class I GH19 chitinase (CHIC_SECCE), 266 aa
                        # Source sequence for PDB 4J0L (1.75 Å); DBREF in 4J0L confirms Q9FRV0
                        # Gene RSCC; CAA28969.1 was wrong (27 aa fragment)


  # ============================================================
  # 2. PURPLE ACID PHOSPHATASES (PAPs)
  # ============================================================
  # Convergent substitutions: Fukushima et al. 2017; Nishimura et al. 2014
  # Metal center: binuclear Fe(III)-M(II) where M = Zn, Mn, or Fe
  # Expected size: 420-680 aa (includes N-terminal signal peptide)
  # Key literature:
  #   - Nishimura et al. 2014 — PAP activity in carnivorous plants
  #   - Li et al. 2002 (AAM15910.1) — Arabidopsis PAP family
  #   - NOTE: Some short entries (~200-400 aa) are fragments or inactive isoforms

  purple_acid_phosphatase:
    merops: null
    convergent_source: "Fukushima et al. 2017; Nishimura et al. 2014"
    expected_length_aa: [420, 680]
    accessions:

      # --- Nepenthes ---
      Nepenthes_alata:
        - BAW35430.1    # VERIFIED: Purple acid phosphatase, 638 aa; Rottloff et al. 2016

      Nepenthes_gracilis:
        - GMH02520.1    # GENOME: hypothetical protein Nepgr_004359, 640 aa; Saul 2023 N. gracilis genome
        - GMH01779.1    # GENOME: hypothetical protein Nepgr_003618, 663 aa; Saul 2023 genome
                        # Both returned in PAP Entrez search; length matches PAP range (420-680 aa).
                        # CAUTION: annotated as "hypothetical protein" — verify Metallophos domain
                        # via CDD before accepting. Search confirms PAP domain present at query time.

      # --- Cephalotus ---
      Cephalotus_follicularis:
        - GAV56562.1    # GENOME VERIFIED: Metallophos + Metallophos_C domain protein, 618 aa
        - GAV57861.1    # GENOME VERIFIED: Metallophos + Metallophos_C domain protein, 463 aa
                        # "Metallophos + Metallophos_C" is the canonical NCBI domain annotation
                        # for plant purple acid phosphatases (calcineurin-like phosphoesterase family).

      # --- Drosera ---
      Drosera_capensis:
        - KAL9274727.1  # GENOME: Purple acid phosphatase 10-like, 679 aa (full-length)
        - KAL9273356.1  # GENOME: inactive PAP27-like, 664 aa
        - KAL9270293.1  # GENOME: PAP2-like, 464 aa

      # --- Dionaea ---
      Dionaea_muscipula:
        - GAB2272196.1  # GENOME VERIFIED: Purple acid phosphatase 22, 461 aa; Palfalvi 2020 genome
        - GAB2282081.1  # GENOME VERIFIED: Purple acid phosphatase 15, 546 aa; Palfalvi 2020 genome
                        # GAB2278364.1 (234 aa) excluded — partial sequence only
                        # GAB2269693.1 (660 aa) excluded — annotated as INACTIVE isoform (PAP27-like)

      # NOTE: Aldrovanda vesiculosa PAP — REMOVED (April 2026)
      # PRJNA918534 is organellar-genome only; no nuclear PAP annotation in NCBI.
      # Palfalvi 2020 nuclear genome not submitted to NCBI Protein. Confirmed absent.

      # --- Sarraceniaceae (Ericales — origin 5) ---
      Sarracenia_purpurea:
        - KAL6998072.1  # GENOME VERIFIED: Putative purple acid phosphatase 20, 428 aa
                        # Tarnita 2023 genome (PRJNA1050616, var. burkii). Active isoform.
                        # KAL6996968.1 (626 aa, "putative inactive PAP27") excluded — annotated inactive.
      Darlingtonia_californica:
        - TODO          # NOT FOUND in NCBI protein search (genome JAUBWS000000000 not annotated)
      Heliamphora_ciliata:
        - TODO          # NOT FOUND in NCBI protein search (genome JAUMHN000000000 not annotated)

      # Nepenthes_mirabilis PAP (ENA PRJEB86749 only; Goh 2025 S3 parsed April 2026):
      Nepenthes_mirabilis_PAP:
        - TODO          # PARTIAL_RESOLVE: 27 PAP gene models found in Goh 2025 S3 (doi:10.1371/journal.pone.0322885.s003)
                        # Best active candidates (exclude INACTIVE-annotated entries):
                        #   Nep_mir_jg12124.t1 (426 aa): PF16656 N-term PAP + PF00149 + cd00839 + PF14008 + PANTHER PTHR22953:SF130
                        #   Nep_mir_jg35245.t1 (615 aa): cd00839 + PF14008 + SSF49363 + PANTHER PTHR45778:SF28
                        #   Nep_mir_jg38588.t1 (661 aa): PF16656 + PF14008 + PANTHER PTHR45778:SF7
                        # ACTION: Download ENA PRJEB86749 protein FASTA; extract these 3 gene IDs;
                        # store as resources/accessions/n_mirabilis_pap.fasta (manual step).

      # --- Lentibulariaceae (Lamiales — origin 6) ---
      Utricularia_gibba:
        - TODO          # CONFIRMED NOT IN PUBLIC DB: UniProt taxid 13748 returns only plastid proteins.
                        # NCBI Protein for U. gibba: only chloroplast/mitochondrial entries.
                        # A0A178UD94 (previously entered here) is WRONG — confirmed to be Arabidopsis thaliana PAP (475 aa).
                        # Lan 2017 genome (GCA_002189035.1) gene models are in JGI/CoGe format; not indexed in NCBI.
                        # ACTION: Download Lan 2017 supplementary gene models; blast for Metallophos domain;
                        # store as resources/accessions/u_gibba_pap.fasta (manual step).
      Pinguicula_moranensis:
        - TODO          # NOT FOUND in NCBI protein search (genome JAOWBN000000000 not annotated)

      # --- Outgroups ---
      Arabidopsis_thaliana:
        - NP_180287.2   # OUTGROUP VERIFIED: PAP12 (AT2G01880), 469 aa; well-characterized
        - AEE74502.1    # OUTGROUP VERIFIED: PAP15 (AT3G07130), 532 aa
        - AED95939.1    # OUTGROUP VERIFIED: PAP27 (AT1G13750), 611 aa — best size match

      Vitis_vinifera:
        - XP_002264113.1 # OUTGROUP VERIFIED: purple acid phosphatase, 472 aa

      Solanum_lycopersicum:
        - AJK28063.1    # OUTGROUP VERIFIED: purple acid phosphatase, 470 aa


  # ============================================================
  # 3. RNase T2 (S-LIKE RNases)
  # ============================================================
  # Convergent substitutions: Fukushima et al. 2017
  # Expected size: ~200-270 aa (relatively small, no large inserts)
  # Substrate: RNA; cleaves after pyrimidines (preference for ApA, UpA)
  # Key literature:
  #   - Fukushima et al. 2017 — convergent substitutions in carnivorous plants
  #   - Drosera adelae RNase: BAE16663.1, BAE44977.1 (Nishimura lab)
  #   - Rottloff et al. 2016 — Nepenthes alata secretome including RNase T2

  rnase_t2:
    merops: null
    convergent_source: "Fukushima et al. 2017"
    expected_length_aa: [200, 270]
    accessions:

      # --- Nepenthes ---
      Nepenthes_alata:
        - BAW35436.1    # VERIFIED: RNase T2, 231 aa; Rottloff et al. 2016

      Nepenthes_gracilis:
        - GMG98952.1    # GENOME: hypothetical protein Nepgr_000792, 270 aa; Saul 2023 genome
        - GMG98423.1    # GENOME: hypothetical protein Nepgr_000263, 276 aa; Saul 2023 genome
                        # Returned by ribonuclease Entrez search (180-280 aa filter); slightly
                        # above expected 200-270 aa but within range including signal peptide.
                        # CAUTION: "hypothetical protein" — verify RNase_T2_euk domain via CDD.

      # --- Cephalotus ---
      Cephalotus_follicularis:
        - BAN14352.1    # VERIFIED: S-like ribonuclease, 227 aa; Fukushima 2017 supplement
        - BAN14351.1    # VERIFIED: S-like ribonuclease, 227 aa (isoform)
        - GAV76166.1    # GENOME: Ribonuclease_T2 domain protein, 227 aa
        - GAV79026.1    # GENOME: Ribonuclease_T2 domain protein, 227 aa

      # --- Drosera ---
      Drosera_adelae:
        - BAE16663.1    # VERIFIED: ribonuclease, 227 aa; Nishimura lab
        - BAE44977.1    # VERIFIED: ribonuclease, 227 aa (isoform)

      Drosera_capensis:
        - KAL9268294.1  # GENOME: Extracellular ribonuclease LE-like, 228 aa; D. capensis WGS
        - KAL9267125.1  # GENOME: Extracellular ribonuclease LE-like, 228 aa (second isoform)
                        # "Extracellular ribonuclease LE-like" is standard NCBI annotation for
                        # secreted plant RNase T2 (same pattern as BAW35436.1, BAE16663.1)
                        # TODO: confirm RNase T2 domain (cd08148) via CDD before running

      # --- Dionaea ---
      Dionaea_muscipula:
        - BAH22709.1    # VERIFIED: S-like ribonuclease, 225 aa; AB481098.1 (Kodaira et al.)
                        # Nishimura lab (Waseda); domain RNase_T2_euk (residues 24-222) confirmed
                        # Expression characterized in snap traps (Planta 2013, Nishimura lab)

      # --- Aldrovanda ---
      Aldrovanda_vesiculosa:
        - BAO05319.1    # VERIFIED: S-like ribonuclease, 228 aa [Aldrovanda vesiculosa]
                        # Nishimura lab; cloned from cDNA, AB accession for nucleotide.
                        # "S-like ribonuclease" is the standard label for secreted RNase T2.

      # --- Sarraceniaceae (Ericales — origin 5) ---
      Sarracenia_purpurea:
        - TODO          # NOT FOUND: NCBI Entrez ribonuclease search returns only RNase P
                        # (KAL6997262.1/KAL6995901.1) which is a DIFFERENT enzyme (tRNA processing).
                        # RNase T2 from S. purpurea not yet deposited as a standalone accession.
      Darlingtonia_californica:
        - TODO          # NOT FOUND in NCBI protein search
      Heliamphora_ciliata:
        - TODO          # NOT FOUND in NCBI protein search

      # --- Utricularia ---
      Utricularia_gibba:
        - TODO          # CONFIRMED NOT IN NCBI/UNIPROT: Only plastid proteins exist for U. gibba.
                        # Gene UgRibT2-1 (unitig_26.g10301.t1) described in Plant Methods 2020
                        # (PMC7149871); has secretion peptide, likely digestive; NO NCBI accession.
                        # ACTION: Download Lan 2017 JGI gene models; extract unitig_26.g10301.t1;
                        # store as resources/accessions/u_gibba_rnase_t2.fasta (manual step).

      # --- Pinguicula ---
      Pinguicula_moranensis:
        - TODO          # NOT FOUND in NCBI protein search

      # --- Outgroups ---
      Arabidopsis_thaliana:
        - AAC48926.1    # OUTGROUP VERIFIED: ribonuclease (RNS1), 222 aa
        - AAC48925.1    # OUTGROUP VERIFIED: ribonuclease (RNS2), 230 aa
        - AAD14489.1    # OUTGROUP VERIFIED: ribonuclease (RNS3), 222 aa

      Solanum_lycopersicum:
        - NP_001234551.2 # OUTGROUP VERIFIED: intracellular ribonuclease LX precursor, 237 aa
        - CAA55895.1    # OUTGROUP VERIFIED: ribonuclease (RNase LE), 230 aa

      Vitis_vinifera:
        - XP_002275271.1 # OUTGROUP VERIFIED: extracellular ribonuclease LE-like, 226 aa
        - XP_010661083.1 # OUTGROUP VERIFIED: ribonuclease 1-like, 254 aa
                        # XP_002285005.1 was wrong (92 aa fragment; replaced with these two)


  # ============================================================
  # 4. NEPENTHESINS / DROSERASINS (Aspartic proteases, A1B)
  # ============================================================
  # Primary digestive proteases of carnivorous plants
  # Merops family: A01.073 (nepenthesin subgroup)
  # Subfamilies:
  #   Nepenthesins I/II (Nepenthes spp.) — contain unique nepenthesin insert domain
  #   Droserasins (Drosera spp.) — related to pepsin
  #   Dionain (Dionaea muscipula) — aspartic protease
  # No experimental structure for nepenthesins (Kadek 2016 crystallized but coords not deposited)
  # Key literature:
  #   - Athauda et al. 2004, Biochem J — nepenthesin I and II characterization
  #   - Butts et al. 2016, Proteins — droserasin structure prediction
  #   - Takahashi et al. 2011, FEBS Lett — nepenthesin substrate specificity

  nepenthesins:
    merops: A01.073
    subfamily: A1B
    experimental_pdb: null          # Kadek 2016 crystallized at 2.8Å but coords NOT deposited
    convergent_source: "Fukushima et al. 2017"
    expected_length_aa: [280, 650]  # Wide range: dionains ~300 aa, nepenthesins ~437 aa,
                                    # phytepsins up to ~510 aa, Cephalotus AP 612 aa
    accessions:

      # --- Nepenthes (canonical nepenthesins) ---
      Nepenthes_gracilis:
        - BAD07474.1    # VERIFIED: Nepenthesin I (Nep I), 437 aa; Athauda et al. 2004 ANCHOR
                        # Protein accession for AB114914 mRNA (elink nuccore→protein: 41016421)
        - BAD07475.1    # VERIFIED: Nepenthesin II (Nep II), 438 aa; Athauda et al. 2004 ANCHOR
                        # Protein accession for AB114915 mRNA
                        # NOTE: GMG99884.1 removed from here (kept only in neprosins — DUF239 family)

      Nepenthes_alata:
        - BBF98357.1    # VERIFIED: Nepenthesin III, 442 aa; Kadek et al. 2016
        - BAV14385.1    # VERIFIED: Nepenthesin II, 437 aa

      Nepenthes_mirabilis:
        - AFV26024.1    # VERIFIED: Nepenthesin 1, 437 aa; Takahashi et al. 2011
        - AFV26025.1    # VERIFIED: Nepenthesin 2, 437 aa; Takahashi et al. 2011

      # --- Drosera (droserasins) ---
      Drosera_capensis:
        - KAL9267547.1  # GENOME: Aspartic proteinase nepenthesin-1-like, 440 aa; D. capensis WGS
        - KAL9250295.1  # GENOME: Aspartic proteinase nepenthesin-1-like, 449 aa; D. capensis WGS
                        # These are the best available droserasin-type A1B entries (Butts 2016
                        # LIEC locus IDs differ from KAL numbering; BLAST verification recommended).
                        # KAL9250314.1 removed — annotated as "guard-cell AP 1-like" which is
                        # likely a non-digestive isoform (stomatal function, not secretome).
                        # Additional candidates: KAL9267546.1 (435 aa), KAL9265331.1 (440 aa),
                        # KAL9261082.1 (435 aa) — include if BLAST confirms droserasin identity.

      Drosera_rotundifolia:
        - GAB2239788.1  # GENOME: hypothetical protein Droror1_Dr00020306, 432 aa
                        # Returned by aspartic protease Entrez search (280-660 aa filter).
                        # CAUTION: annotated "hypothetical protein" — verify A1B subfamily
                        # (PLN03146 / eukaryotic aspartyl protease) via CDD before running.

      Drosera_spatulata:
        - TODO          # NOT FOUND: Entrez search returned no A1B aspartic protease for this taxon.

      # --- Dionaea (dionain) ---
      Dionaea_muscipula:
        - A0A0E3GLN3    # VERIFIED UniProt: Dionain-1, aspartic protease; Palfalvi 2020
        - A0A0E3M338    # VERIFIED UniProt: Dionain-3, aspartic protease; Palfalvi 2020

      # NOTE: Aldrovanda vesiculosa A1B aspartic protease — REMOVED (April 2026)
      # PRJNA918534 is organellar-genome only; no nuclear aspartic protease in NCBI.
      # Expected droserasin/dionain-like sequences given sister relationship to Dionaea
      # but Palfalvi 2020 nuclear genome was not submitted to NCBI Protein. Confirmed absent.

      # --- Cephalotus ---
      Cephalotus_follicularis:
        - GAV28673.1    # GENOME: eukaryotic aspartyl protease, 461 aa (Fukushima 2017 genome)
                        # TODO: verify this is an A1B subfamily member (PSI insert check)
        - GAV69561.1    # GENOME: eukaryotic aspartyl protease, 457 aa
                        # NOTE: Cephalotus AP was included in Fukushima 2017 convergence analysis

      # --- Sarraceniaceae (Ericales — origin 5) ---
      Sarracenia_purpurea:
        - BAW35441.1    # VERIFIED: Aspartic protease, 485 aa [Sarracenia purpurea subsp. venosa]
                        # Directly characterized; correct size for A1B subfamily.
                        # Verify PSI insert presence before including in A1B alignment.

      Darlingtonia_californica:
        - TODO          # NOT FOUND in NCBI protein search

      Heliamphora_ciliata:
        - TODO          # NOT FOUND in NCBI protein search

      # --- Lentibulariaceae (Lamiales — origin 6) ---
      Utricularia_gibba:
        - TODO          # CONFIRMED NOT IN NCBI/UNIPROT: Only plastid proteins for U. gibba.
                        # Utricularia has a highly reduced genome (~82 Mb); A1B AP family
                        # may have been lost. Lan 2017 gene models are in JGI format only.
                        # ACTION: Search Lan 2017 gene models for eukaryotic aspartyl protease domain.

      Pinguicula_moranensis:
        - TODO          # NOT FOUND in NCBI protein search

      # --- Outgroups (plant aspartic proteases, A1 family) ---
      Arabidopsis_thaliana:
        - NP_187876.2   # OUTGROUP VERIFIED: Eukaryotic aspartyl protease family, 461 aa
        - NP_565911.1   # OUTGROUP VERIFIED: Eukaryotic aspartyl protease family, 442 aa

      Solanum_lycopersicum:
        - XP_004253208.1 # OUTGROUP VERIFIED: ASPARTIC PROTEASE IN GUARD CELL 2, 486 aa
        - XP_019070220.2 # OUTGROUP VERIFIED: ASPARTIC PROTEASE IN GUARD CELL 1-like, 455 aa

      Hordeum_vulgare:
        - P42210        # OUTGROUP VERIFIED: HvPhytepsin (ASPR_HORVU), 508 aa — A1B phytepsin
                        # UniProt Swiss-Prot; well-characterized barley vacuolar A1B aspartic protease
                        # M0W9B2 (HvNEP-1) was inaccessible (empty UniProt response, accession obsolete)
                        # P42210 is the best available barley A1B outgroup
        - XP_045019345.1 # OUTGROUP: Hordeum nucellin-like (no PSI insert), 393 aa
                        # Useful as structural contrast: nucellin lacks the PSI domain of nepenthesins

      Triticum_dicoccoides:
        - XP_037427783.1 # OUTGROUP VERIFIED: aspartic proteinase nepenthesin-2-like, 469 aa
                        # Triticum dicoccoides (emmer wheat, T. aestivum progenitor) — not T. aestivum.
                        # Annotation "nepenthesin-2-like" confirms A1B subfamily.

      Vitis_vinifera:
        - XP_019076990.1 # OUTGROUP VERIFIED: probable aspartyl protease At4g16563-like, 458 aa
                        # Replaces XP_002267025.1 (WRONG — that accession is phosphatidylinositol
                        # 4-kinase gamma 5, completely wrong enzyme).


  # ============================================================
  # 5. NEPROSINS (Glutamic peptidases, G3 / DUF239)
  # ============================================================
  # Unique to Nepenthes — not found in other carnivorous lineages
  # Merops family: G03.001 (neprosin-1)
  # Experimental structures available: 7ZVA, 7ZVB, 7ZVC, 7ZU8
  # Substrate: proline-containing peptides (cleaves after Pro)
  # Biotech application: gluten/gliadin digestion (coeliac disease therapy)
  # Key literature:
  #   - Del Amo-Maestro et al. 2022, Nat. Commun. — crystal structures (PDB 7ZVA-C, 7ZU8)
  #   - Schräder et al. 2017, Mol Cell Proteomics — neprosin as prolyl endoprotease
  #   - Tiew & Goh 2022 — placed in glutamic peptidase family G3
  #   - Ting et al. 2026 — gluten detoxification with neprosin

  neprosins:
    merops: G03.001
    subfamily: G3
    experimental_pdb:
      - "7ZVA"    # Zymogen native, 1.80 Å — primary validation target
      - "7ZVB"    # Mature form, 2.35 Å
      - "7ZVC"    # Mature form (crystal form 2), 1.85 Å
      - "7ZU8"    # Zymogen + inhibitor Lu-Xo4, 2.05 Å
    convergent_source: "Not applicable — Nepenthes-specific family"
    expected_length_aa: [370, 470]
    notes: "Nepenthes-specific; no other carnivorous lineage has this family. Convergence analysis not applicable but structural comparison across Nepenthes species IS planned."
    accessions:

      # --- Nepenthes gracilis (primary species) ---
      Nepenthes_gracilis:
        - GMG99884.1    # GENOME: Nepgr_001724, 467 aa (Saul 2023) — may be neprosin
        - GMH01265.1    # GENOME: Nepgr_003104, 445 aa (Saul 2023) — may be neprosin
                        # NOTE: Saul 2023 genome predicts ~8 neprosin paralogs; confirm annotation

      # --- Nepenthes ampullaria (high-pH pitcher, pH~5 — useful for pH comparison) ---
      Nepenthes_ampullaria:
        - ARA95696.1    # VERIFIED: Neprosin 2, 421 aa
        - ARA95695.1    # VERIFIED: Neprosin 1, 421 aa

      # --- Nepenthes ventrata (source of crystal structures) ---
      Nepenthes_ventrata:
        - C0HLV2.1      # VERIFIED UniProt: Neprosin (Npr1), 380 aa — mature form
                        # This is the sequence used for crystal structures 7ZVA-C

      # --- Additional Nepenthes species (for cross-species comparison) ---
      Nepenthes_mirabilis:
        - TODO          # PARTIAL_RESOLVE: Goh 2025 genome (PRJEB86749, ENA) not in NCBI Protein.
                        # S3 supplementary (doi:10.1371/journal.pone.0322885.s003) parsed April 2026.
                        # PF03080 (Neprosin): 36 Pfam hits; first hit Nep_mir_jg11529.t1 (domain E=7.8e-10)
                        # DUF239 PANTHER: 64 hits; first hit Nep_mir_jg39601.t1
                        # NOTE: Domain hit length (110 aa) is partial domain score; full gene model
                        # may be 370-470 aa — confirm by pulling full sequence from ENA PRJEB86749.
                        # ACTION: Download ENA PRJEB86749 protein FASTA; extract all PF03080/DUF239 hits;
                        # retain those 370-470 aa; store as resources/accessions/n_mirabilis_neprosin.fasta
                        # N. mirabilis is common swamp pitcher plant (pH~3.0).

      Nepenthes_rafflesiana:
        - TODO          # NOT IN NCBI: No N. rafflesiana genome published (April 2026).
                        # N. × ventrata (C0HLV2) is a hybrid of N. rafflesiana × N. alata;
                        # C0HLV2 is the closest available surrogate — note this limitation.
                        # Lee 2016 transcriptome (PRJNA study, doi:10.1021/acs.jproteome.6b00224)
                        # contains neprosin transcripts but not deposited as NCBI accessions.

      Nepenthes_bicalcarata:
        - TODO          # NOT IN NCBI: No published genome or neprosin accession for N. bicalcarata.
                        # Mutualistic species (ants in pitchers); neprosin may be reduced/absent.
                        # Search transcriptome data if available from pitcher fluid proteomics.

      # NOTE: No neprosin homologs found outside Nepenthes as of April 2026
      # All DUF239/G3 family members are restricted to the Nepenthes lineage
      # No outgroup sequences needed for this family (no convergence analysis)
      # BUT: include for pH-correlated stability comparison across Nepenthes


