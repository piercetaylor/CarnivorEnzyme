        - KAL9250314.1  # GENOME: ASPARTIC PROTEASE IN GUARD CELL 1-like, D. capensis
                        # NOTE: guard-cell AP may not be the digestive droserasin;
                        # TODO: cross-reference with Butts 2016 supplementary to get droserasin-1/2
                        # Butts 2016 (Proteins 84:1517) Supplementary Table S1 has accessions

      Drosera_rotundifolia:
        - TODO          # Search GAB (D. rotundifolia genome) for aspartic protease A1B
                        # Query: txid[1309783][Organism] AND aspartic_protease[All Fields]

      Drosera_spatulata:
        - TODO          # GENOME (JAOVYX000000000, Tarnita 2023): search for A1B aspartic protease

      # --- Dionaea (dionain) ---
      Dionaea_muscipula:
        - A0A0E3GLN3    # VERIFIED UniProt: Dionain-1, aspartic protease; Palfalvi 2020
        - A0A0E3M338    # VERIFIED UniProt: Dionain-3, aspartic protease; Palfalvi 2020

      # --- Aldrovanda (origin 3, sister to Dionaea) ---
      Aldrovanda_vesiculosa:
        - TODO          # GENOME (PRJNA918534): search for A1B aspartic protease
                        # Expect droserasin/dionain-like given sister relationship to Dionaea

      # --- Cephalotus ---
      Cephalotus_follicularis:
        - GAV28673.1    # GENOME: eukaryotic aspartyl protease, 461 aa (Fukushima 2017 genome)
                        # TODO: verify this is an A1B subfamily member (PSI insert check)
        - GAV69561.1    # GENOME: eukaryotic aspartyl protease, 457 aa
                        # NOTE: Cephalotus AP was included in Fukushima 2017 convergence analysis

      # --- Sarraceniaceae (Ericales — origin 5) ---
      Sarracenia_purpurea:
        - TODO          # GENOME (JAULLE000000000): search for A1B aspartic protease
