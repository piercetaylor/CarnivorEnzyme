      Darlingtonia_californica:
        - TODO          # GENOME (JAUBWS000000000): search for A1B aspartic protease

      Heliamphora_ciliata:
        - TODO          # GENOME (JAUMHN000000000): search for A1B aspartic protease

      # --- Lentibulariaceae (Lamiales — origin 6) ---
      Utricularia_gibba:
        - TODO          # GENOME (GCA_002189035.1): search for A1B aspartic protease
                        # Note: Utricularia genome is highly reduced; may have lost this family

      Pinguicula_moranensis:
        - TODO          # GENOME (JAOWBN000000000): search for A1B aspartic protease

      # --- Outgroups (plant aspartic proteases, A1 family) ---
      Arabidopsis_thaliana:
        - NP_187876.2   # OUTGROUP VERIFIED: Eukaryotic aspartyl protease family, 461 aa
        - NP_565911.1   # OUTGROUP VERIFIED: Eukaryotic aspartyl protease family, 442 aa

      Solanum_lycopersicum:
        - XP_004253208.1 # OUTGROUP VERIFIED: ASPARTIC PROTEASE IN GUARD CELL 2, 486 aa
