  # ============================================================
  # Convergent substitutions: Fukushima et al. 2017; Nishimura et al. 2014
  # Metal center: binuclear Fe(III)-M(II) where M = Zn, Mn, or Fe
  # Expected size: 420-680 aa (includes N-terminal signal peptide)
  # Key literature:
  #   - Nishimura et al. 2014 — PAP activity in carnivorous plants
  #   - Li et al. 2002 (AAM15910.1) — Arabidopsis PAP family
  #   - NOTE: Some short entries (~200-400 aa) are fragments or inactive isoforms

  purple_acid_phosphatase:
    merops: null
    convergent_source: "Fukushima et al. 2017; Nishimura et al. 2014"
    expected_length_aa: [420, 680]
    accessions:

      # --- Nepenthes ---
      Nepenthes_alata:
        - BAW35430.1    # VERIFIED: Purple acid phosphatase, 638 aa; Rottloff et al. 2016

      Nepenthes_gracilis:
