  #   - Drosera adelae RNase: BAE16663.1, BAE44977.1 (Nishimura lab)
  #   - Rottloff et al. 2016 — Nepenthes alata secretome including RNase T2

  rnase_t2:
    merops: null
    convergent_source: "Fukushima et al. 2017"
    expected_length_aa: [200, 270]
    accessions:

