# Enzyme families and protein accessions for CarnivorEnzyme pipeline.
# Used by: fetch_sequences.py, retrieve.smk
#
# Accession format: NCBI protein accession (e.g. BAF98919.1) or UniProt ID (e.g. C0HLV2)
# All accessions verified against NCBI Protein database, April 2026.
#
# Annotation conventions:
#   # VERIFIED: accession confirmed in NCBI/UniProt with correct annotation
#   # GENOME:   derived from genome annotation (may be hypothetical protein)
#   # TODO:     accession not yet found; requires supplementary table from cited paper
#   # PARTIAL:  sequence is incomplete (<80% expected length); flag for length filter
#   # OUTGROUP: non-carnivorous outgroup sequence
#
# Length ranges (expected full-length for filtering):
#   GH19 chitinases:         250-350 aa (mature); flag <200 aa
#   Purple acid phosphatase: 420-680 aa; flag <350 aa (some are truncated isoforms)
#   RNase T2:                200-270 aa; flag <180 aa
#   Nepenthesins (A1B):      380-460 aa (preproenzyme); flag <300 aa
#   Neprosins (G3):          370-470 aa (zymogen); flag <300 aa

tier1:

  # ============================================================
  # 1. GH19 CHITINASES (Class IV acidic chitinases)
  # ============================================================
  # Convergent substitutions: Fukushima et al. 2017, Nature Ecol. Evol., Fig. 3a
  # CAZy family: GH19 (glycoside hydrolase family 19)
  # Expected size: ~270-340 aa mature form
  # Key literature:
  #   - Fukushima et al. 2017 — convergent substitutions identified
  #   - Yoneda et al. 2025, FEBS Open Bio — D. adelae chitinase structurally characterized
  #   - Yoneda et al. 2025: first carnivorous plant chitinase with experimental structure (PDB?)
  #   - Drosera binata DbChitI-3 chitinase: pH optimum 2.5, induced by prey (Planta 2025)
  #   - GH19 Engineering Database (PMC8547705) — comprehensive sequence/diversity resource
  #   - Rye (Secale cereale) chitinase PDB 4J0L: crystal structure reference for GH19 fold
  #   - Nepenthes chitinase NkChit2b-1 (Springer 2025) — insect resistance

  chitinases_gh19:
    cazy: GH19
    merops: null
    convergent_source: "Fukushima et al. 2017 Fig. 3a"
    expected_length_aa: [250, 350]
    accessions:

      # --- Nepenthes (Caryophyllales, pitfall pitcher) ---
      Nepenthes_gracilis:
        - GMH02533.1    # GENOME: Nepgr_004372, GH19 domain, 281 aa (Saul 2023 genome)
        - GMH20431.1    # GENOME: Nepgr_022272, GH19, 279 aa
        - GMH20430.1    # GENOME: Nepgr_022271, GH19, 276 aa
        - GMH27899.1    # GENOME: Nepgr_029742, GH19, 277 aa

      Nepenthes_alata:
        - BAF98919.1    # VERIFIED: Class IV chitinase, 277 aa; Ohnuma et al. 2011, Glycobiology
        - BBC62322.1    # VERIFIED: Class IV chitinase, 276 aa

      # --- Cephalotus (Oxalidales, pitfall pitcher — independent origin) ---
      Cephalotus_follicularis:
        - GAV70878.1    # GENOME: Glyco_hydro_19 domain, 319 aa (Fukushima 2017 genome)
        - GAV79313.1    # GENOME: GH19/Chitin_bind_1, 266 aa
        - GAV84623.1    # GENOME: GH19/Chitin_bind_1, 456 aa — NOTE: may include extra domain

      # --- Drosera (Caryophyllales, sticky trap) ---
      Drosera_rotundifolia:
        - GAB2242148.1  # GENOME: Droror1_Dr00018923, GH19-like, 279 aa
        - GAB2242147.1  # GENOME: Droror1_Dr00018922, GH19-like, 275 aa

      Drosera_capensis:
        - BDB33378.1    # VERIFIED: Class I chitinase, 325 aa — NOTE: Class I not Class IV;
                        # include for alignment context but flag as class_i=true
                        # TODO: Find D. capensis Class IV (GH19) from genome (KAL accessions)

      Drosera_adelae:
        - TODO          # Yoneda et al. 2025 (FEBS Open Bio) characterized D. adelae chitinase —
                        # search for accession in that paper's data availability section

      # --- Dionaea (Caryophyllales, snap trap) ---
      Dionaea_muscipula:
        - ALO61073.1    # VERIFIED: Chitinase B, 314 aa; Libantova et al. 2014
                        # NOTE: class annotation ambiguous; verify GH19 membership via CAZy BLAST
        - AHB62682.1    # VERIFIED: Putative VF Chitinase I, 314 aa

      # --- Outgroups (non-carnivorous plants with characterized GH19 chitinases) ---
      Arabidopsis_thaliana:
        - BAD44251.1    # OUTGROUP VERIFIED: Class IV chitinase (CHIV/AT3G54420), 273 aa
        - O24603.1      # OUTGROUP VERIFIED: Endochitinase CHI (AT2G43570), 277 aa

      Solanum_lycopersicum:
        - TODO          # OUTGROUP: find tomato GH19 class IV chitinase (search SlChiIV)

      # --- Sarraceniaceae (Ericales — independent origin 5) ---
      Sarracenia_purpurea:
        - TODO          # GENOME (JAULLE000000000, Tarnita 2023): search NCBI WGS for GH19
                        # Query: txid[4126][Organism] AND glycoside_hydrolase_19[All]

      Sarracenia_alata:
        - TODO          # GENOME (JAPEKV000000000, Tarnita 2023): search for GH19 annotation

      Darlingtonia_californica:
        - TODO          # GENOME (JAUBWS000000000, Tarnita 2023): search for GH19 annotation
                        # Note: divergent Sarraceniaceae; cobra lily with pH~5 fluid

      Heliamphora_ciliata:
        - TODO          # GENOME (JAUMHN000000000, Tarnita 2023): search for GH19 annotation
                        # Note: least acidic Sarraceniaceae (pH 5.5); useful pH-gradient endpoint

      # --- Lentibulariaceae (Lamiales — independent origin 6) ---
      Utricularia_gibba:
        - TODO          # GENOME (GCA_002189035.1, Lan 2017): search for GH19 annotation
                        # Query: txid[200816][Organism] AND GH19 OR chitinase[All]

      Pinguicula_moranensis:
        - TODO          # GENOME (JAOWBN000000000, Tarnita 2023): search for GH19 annotation

      # --- Byblidaceae (Lamiales — independent origin 7) ---
      Byblis_filifolia:
        - TODO          # No genome as of April 2026; Pavlovič 2025 (Plant Biology) confirmed
                        # digestive enzyme secretion; check paper for any characterized accessions

      # --- Aldrovanda (Caryophyllales, snap trap — origin 3, sister to Dionaea) ---
      Aldrovanda_vesiculosa:
        - TODO          # GENOME (PRJNA918534, Adamec 2023): search for GH19 annotation
                        # 20% TE content; may have partial gene models

      # --- Additional Drosera ---
      Drosera_spatulata:
        - TODO          # GENOME (JAOVYX000000000, Tarnita 2023): search for GH19 annotation

      Drosera_binata:
        - TODO          # No genome; DbChitI-3 (Planta 2025) characterized at pH 2.5
                        # DbChitI-3 is an acidic class I chitinase — check paper for accession

      # --- Additional Nepenthes ---
      Nepenthes_mirabilis:
        - TODO          # GENOME (PRJEB86749, Goh 2025 PLOS One): search for GH19 annotation

      Secale_cereale:
        - Q9FRV0        # OUTGROUP VERIFIED: Rye class I GH19 chitinase (CHIC_SECCE), 266 aa
                        # Source sequence for PDB 4J0L (1.75 Å); DBREF in 4J0L confirms Q9FRV0
                        # Gene RSCC; CAA28969.1 was wrong (27 aa fragment)


  # ============================================================
