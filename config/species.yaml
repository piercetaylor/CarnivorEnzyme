# Species metadata for CarnivorEnzyme pipeline.
# Used by: retrieve.smk, orthology.smk, convergence.smk, expression.smk
#
# Fields:
#   code:           short identifier used as wildcard in Snakemake rules and filenames
#   taxid:          NCBI taxonomy ID
#   genome:         NCBI assembly accession or BioProject ("transcriptome_only", "none")
#   pitcher_pH:     measured or estimated fluid pH (null = not applicable or unknown)
#   clade/order:    angiosperm order
#   trap:           trap morphology
#   carnivory_origin: integer grouping independent origins (1=Caryophyllales, 4=Oxalidales, etc.)
#   expression_sra: SRA BioProject accession for RNA-seq (null if not used)
#   genome_source:  citation for genome assembly
#   tier:           1=core pipeline, 2=extended atlas
#
# CARNIVORY ORIGINS (independent evolutionary events):
#   1 — Caryophyllales: Nepenthes, Drosera, Dionaea, Aldrovanda, Drosophyllum (same order)
#   4 — Oxalidales: Cephalotus
#   5 — Ericales: Sarracenia, Darlingtonia, Heliamphora (Sarraceniaceae family)
#   6 — Lamiales: Utricularia, Genlisea, Pinguicula (Lentibulariaceae)
#   7 — Lamiales: Byblis (Byblidaceae; distinct from Lentibulariaceae)
#   NOTE: Roridula (Ericales, Roridulaceae) excluded — lacks endogenous digestive enzymes

# ============================================================
# TIER 1: CORE PIPELINE SPECIES
# ============================================================

